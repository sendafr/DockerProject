

services:
  db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: ${DB_NAME:-authdb}
      POSTGRES_USER: ${DB_USER:-authuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-authpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-authuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth_network

  api:
    build:
      context: ./src_authentic
      dockerfile: Dockerfile
    container_name: authentication-api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 300 authentic.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
      # list of hostnames or IPs that Django will serve
      # the default here is used only if ALLOWED_HOSTS isn't set
      # hard‑code allowed hosts here to guard against incorrect host env vars
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,api"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-authdb}
      DB_USER: ${DB_USER:-authuser}
      DB_PASSWORD: ${DB_PASSWORD:-authpass123}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://frontend}
    volumes:
      - ./src_authentic:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - auth_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: authentication-frontend
    environment:
      VITE_API_BASE_URL: http://api:8000/api
    ports:
      - "80:80"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - auth_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  auth_network:
    driver: bridge