services:
  db:
    image: ghcr.io/sendafr/authentication-db:latest
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  api:
    image: ghcr.io/sendafr/authentication-api:latest

    environment:
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,0.0.0.0
      - DEBUG=True  # Optional: helps with error messages
    # ... rest of your config
      - CSRF_TRUSTED_ORIGINS=http://localhost:8000,http://localhost:5173
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
       db:
         condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - auth_network
    restart: unless-stopped

    command: gunicorn --bind 0.0.0.0:8000 authentic.wsgi:application
    volumes:
      - ./src_authentic:/src_authentic
      - static_volume:/app/staticfiles
      - media_volume:/app/media


  frontend:
    image: ghcr.io/sendafr/authentication-frontend:latest
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/frontend

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  auth_network:
    driver: bridge